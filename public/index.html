<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WinGo Analyzer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f7fb;
        color: #18202f;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 30px;
      }

      .muted {
        color: #5d6678;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
        margin-top: 22px;
      }

      .card {
        background: #fff;
        border: 1px solid #dfe5ef;
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 8px 24px rgba(24, 32, 47, 0.06);
      }

      .label {
        font-size: 13px;
        color: #697386;
        margin-bottom: 8px;
      }

      .value {
        font-size: 24px;
        font-weight: 700;
      }

      pre {
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 1.5;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        background: #2563eb;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>WinGo Analyzer</h1>
      <p class="muted">Public API data se statistical analysis. Prediction guaranteed nahi hai.</p>
      <button id="refresh">Refresh</button>
      <span id="status" class="muted">Loading...</span>

      <section class="grid">
        <article class="card">
          <div class="label">Next Prediction</div>
          <div id="prediction" class="value">-</div>
        </article>
        <article class="card">
          <div class="label">Likely Numbers</div>
          <div id="numbers" class="value">-</div>
        </article>
        <article class="card">
          <div class="label">Latest Issue</div>
          <div id="issue" class="value">-</div>
        </article>
        <article class="card">
          <div class="label">Records</div>
          <div id="records" class="value">-</div>
        </article>
      </section>

      <section class="card" style="margin-top: 14px">
        <div class="label">Full Analysis</div>
        <pre id="analysis">Waiting for data...</pre>
      </section>
    </main>

    <script>
      const refreshButton = document.querySelector("#refresh");
      const statusEl = document.querySelector("#status");
      const publicHistoryUrl =
        "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";
      const targetRecords = 500;
      const recentWindow = 20;

      function normalizeRecord(raw) {
        const number = Number(raw.number);
        if (!raw.issueNumber || !Number.isInteger(number) || number < 0 || number > 9) {
          return null;
        }
        return {
          issueNumber: String(raw.issueNumber),
          number,
          color: String(raw.color || "unknown"),
        };
      }

      function extractRecords(payload) {
        const possibleLists = [payload?.data?.list, payload?.list, payload?.data, payload];
        const list = possibleLists.find(Array.isArray);
        if (!list) throw new Error("No history list found in response");
        return list.map(normalizeRecord).filter(Boolean);
      }

      function mergeRecords(existing, incoming) {
        const byIssue = new Map();
        [...existing, ...incoming].forEach((record) => {
          byIssue.set(record.issueNumber, record);
        });
        return [...byIssue.values()]
          .sort((a, b) => BigInt(b.issueNumber) > BigInt(a.issueNumber) ? 1 : -1)
          .slice(0, targetRecords);
      }

      function sizeOf(number) {
        return number >= 5 ? "Big" : "Small";
      }

      function frequency(records) {
        const counts = Object.fromEntries([...Array(10).keys()].map((n) => [n, 0]));
        records.forEach((record) => {
          counts[record.number] += 1;
        });
        return counts;
      }

      function bigSmallRatio(records) {
        const counts = { Big: 0, Small: 0 };
        records.forEach((record) => {
          counts[sizeOf(record.number)] += 1;
        });
        const total = counts.Big + counts.Small || 1;
        return {
          counts,
          ratio: {
            Big: Number((counts.Big / total).toFixed(3)),
            Small: Number((counts.Small / total).toFixed(3)),
          },
        };
      }

      function detectStreaks(records) {
        if (records.length === 0) {
          return { numberStreak: null, sizeStreak: null };
        }

        const latest = records[0];
        let numberLength = 0;
        let sizeLength = 0;

        for (const record of records) {
          if (record.number === latest.number) numberLength += 1;
          else break;
        }

        for (const record of records) {
          if (sizeOf(record.number) === sizeOf(latest.number)) sizeLength += 1;
          else break;
        }

        return {
          numberStreak: { value: latest.number, length: numberLength },
          sizeStreak: { value: sizeOf(latest.number), length: sizeLength },
        };
      }

      function transitionProbabilities(records) {
        const counts = {
          "Big->Big": 0,
          "Big->Small": 0,
          "Small->Big": 0,
          "Small->Small": 0,
        };
        const chronological = [...records].reverse();

        for (let i = 1; i < chronological.length; i += 1) {
          const previous = sizeOf(chronological[i - 1].number);
          const current = sizeOf(chronological[i].number);
          counts[`${previous}->${current}`] += 1;
        }

        const bigTotal = counts["Big->Big"] + counts["Big->Small"] || 1;
        const smallTotal = counts["Small->Big"] + counts["Small->Small"] || 1;

        return {
          counts,
          probabilities: {
            "Big->Big": Number((counts["Big->Big"] / bigTotal).toFixed(3)),
            "Big->Small": Number((counts["Big->Small"] / bigTotal).toFixed(3)),
            "Small->Big": Number((counts["Small->Big"] / smallTotal).toFixed(3)),
            "Small->Small": Number((counts["Small->Small"] / smallTotal).toFixed(3)),
          },
        };
      }

      function analyzeClient(records) {
        return {
          totalRecords: records.length,
          frequency: frequency(records),
          bigSmall: bigSmallRatio(records),
          streaks: detectStreaks(records),
          transitions: transitionProbabilities(records),
        };
      }

      function predictClient(records) {
        const recent = records.slice(0, recentWindow);
        const recent10 = records.slice(0, 10);
        const analysis = analyzeClient(records);
        const recentFrequency = frequency(recent);
        const recentBigSmall = bigSmallRatio(recent);
        const latestSize = records[0] ? sizeOf(records[0].number) : "Small";
        const transition = analysis.transitions.probabilities;
        const streak = analysis.streaks.sizeStreak;

        let bigScore = recentBigSmall.ratio.Big;
        let smallScore = recentBigSmall.ratio.Small;

        if (latestSize === "Big") {
          bigScore += transition["Big->Big"];
          smallScore += transition["Big->Small"];
        } else {
          bigScore += transition["Small->Big"];
          smallScore += transition["Small->Small"];
        }

        if (streak?.length >= 3) {
          if (streak.value === "Big") smallScore += 0.35;
          if (streak.value === "Small") bigScore += 0.35;
        }

        const predictedRange = bigScore >= smallScore ? "Big" : "Small";
        const rangeNumbers = predictedRange === "Big" ? [5, 6, 7, 8, 9] : [0, 1, 2, 3, 4];
        const topNumbers = rangeNumbers
          .map((number) => ({
            number,
            score:
              (recentFrequency[number] || 0) * 2 +
              (analysis.frequency[number] || 0) / Math.max(records.length, 1) +
              (recent10.some((record) => record.number === number) ? 0.25 : 0),
          }))
          .sort((a, b) => b.score - a.score)
          .slice(0, 2)
          .map((item) => item.number);

        return {
          predictedRange,
          rangeLabel: predictedRange === "Big" ? "5-9" : "0-4",
          topNumbers,
          scores: {
            Big: Number(bigScore.toFixed(3)),
            Small: Number(smallScore.toFixed(3)),
          },
        };
      }

      async function fetchHistoryPage(pageNo, pageSize) {
        const url = new URL(publicHistoryUrl);
        url.searchParams.set("pageNo", pageNo);
        url.searchParams.set("pageSize", pageSize);
        url.searchParams.set("page", pageNo);
        url.searchParams.set("limit", pageSize);
        url.searchParams.set("ts", Date.now());

        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Browser live request failed: ${response.status}`);
        }
        return extractRecords(await response.json());
      }

      async function fetchBrowserDataset() {
        let records = [];

        for (let pageNo = 1; records.length < targetRecords; pageNo += 1) {
          const page = await fetchHistoryPage(pageNo, 50);
          if (page.length === 0) break;

          const before = records.length;
          records = mergeRecords(records, page);
          if (records.length === before) break;
        }

        return records;
      }

      async function loadBrowserLiveData() {
        const records = await fetchBrowserDataset();
        const analysis = analyzeClient(records);
        return {
          appVersion: "browser-live-500-full-logic",
          updatedAt: new Date().toISOString(),
          latestIssue: records[0]?.issueNumber,
          source: "browser-live",
          warning: "Vercel server was blocked by upstream, so this data was fetched from your browser.",
          analysis,
          prediction: predictClient(records),
        };
      }

      function renderData(data) {
        document.querySelector("#prediction").textContent =
          `${data.prediction.predictedRange} (${data.prediction.rangeLabel})`;
        document.querySelector("#numbers").textContent =
          data.prediction.topNumbers.join(", ");
        document.querySelector("#issue").textContent = data.latestIssue;
        document.querySelector("#records").textContent = data.analysis.totalRecords;
        document.querySelector("#analysis").textContent = JSON.stringify(data, null, 2);
        statusEl.textContent = data.warning && data.source !== "browser-live"
          ? `Sample data: ${data.warning}`
          : `Updated ${new Date(data.updatedAt).toLocaleTimeString()} (${data.source})`;
      }

      async function loadPrediction() {
        refreshButton.disabled = true;
        statusEl.textContent = "Updating...";

        try {
          const response = await fetch("/api/prediction");
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Request failed");
          }

          if (data.source === "sample" && data.warning?.includes("403")) {
            renderData(await loadBrowserLiveData());
          } else {
            renderData(data);
          }
        } catch (error) {
          try {
            renderData(await loadBrowserLiveData());
          } catch {
            statusEl.textContent = error.message;
          }
        } finally {
          refreshButton.disabled = false;
        }
      }

      refreshButton.addEventListener("click", loadPrediction);
      loadPrediction();
      setInterval(loadPrediction, 30_000);
    </script>
  </body>
</html>
